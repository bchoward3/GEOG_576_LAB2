<!DOCTYPE html>
<html lang="en">

    <!--ESRI calls-->
    <link rel="stylesheet" href="https://js.arcgis.com/4.3/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.3/"></script>
    <style>
      html, body, #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Locate",
    "esri/Graphic",
    "esri/widgets/Search"
  ], function(esriConfig, Map, MapView, BasemapGallery, Locate, Graphic, Search) {

    esriConfig.apiKey = "AAPTa7WWEMo9Litshe_RCrMPRfA..yeI8LR_CMpFupvlrUJw3fi0kG2eX-IkowyMn_mcFfvUE1vSLrPkrIxhZKx_NzauiWVQwmqtUVs-g9sWEVrhUkUIMdDsT-dW-OfLWvJFgSEJt7LyibSBhpQD1rD0CLkQbWUHz9Jx4FZ-m0Zn6hUupQacC-IImgQF0LYlc06R7dzl37yrITFLItINCGogwgZMgpTJXZa_B1-mqMTD2aDM35EnzrTZgzjCG_T4y0Qf8kQp-txCSRTZBMnHC2Tt-e2ZmrkHMAAI.AT1_lfgE39am";

    const map = new Map({
      basemap: "dark-gray"
    });

    const view = new MapView({
      map: map,
      center: [-81.1329, 32.0043],
      zoom: 11,
      container: "viewDiv"
    });

    //Adding the basemap Gallery per the documentation
    const basemapGallery = new BasemapGallery({
      view: view,
      container: document.createElement("div")
    });
    view.ui.add(basemapGallery, {
      position: "top-right"
    });

    //Adding locate widget per the documentation along with the graphic marker
    const locateWidget = new Locate({
      view: view,
      graphic: new Graphic({
        symbol: { type: "simple-marker" }
      })
    });
    view.ui.add(locateWidget, "top-left");

    //Adding the search widget per the documentation
    const searchWidget = new Search({
    view: view
    });
    // Adds the search widget below other elements in the top left corner of the view
    view.ui.add(searchWidget, {
      position: "bottom-center",
      index: 2
    });


  });
  </script>
  </head>
  <body>

    <div id="viewDiv"></div>
  </body>
