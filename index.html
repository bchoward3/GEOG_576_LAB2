<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Hello, world!</title>
    <meta charset="UTF-8" />

    <!--ESRI calls-->
    <link rel="stylesheet" href="https://js.arcgis.com/4.3/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.3/"></script>
    <style>
      html, body, #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Locate",
    "esri/Graphic",
    "esri/widgets/Search",
  ], function(esriConfig, Map, MapView, BasemapGallery, Locate, Graphic, Search) {

    esriConfig.apiKey = "AAPTaHNXmh4V2CMc6iBCUGvJBbA..ThrLqWMUNnOYgz2GvOcn96fdx1TMwdFQ4wGX5-xVNmXkfEbnKkGV_cZjc0oLC4MCPh7aCg-W1zPuej6RCSxj657uz_e3AKZQw5XJYpLpS1qUMUDi6_6SAkNlYxmx7IrZIEBgUUkNhC5JQ7CMlIGTOnQCVL8bLlnENA91H6DHqItaruwtSuHXQ8FFK3PAp9IOWAb94W3vhRw_CKxVzgY4dg_esiJMUocbnD0Ffjpk9M8BsBOI1nQ58ovAJaM1X33-s6JQsrU.AT1_gzKnMnbn";

    const map = new Map({
      basemap: "dark-gray"
    });

    const view = new MapView({
      map: map,
      center: [-81.1329, 32.0043],
      zoom: 11,
      container: "viewDiv"
    });

    const basemapGallery = new BasemapGallery({
      view: view,
      container: document.createElement("div")
    });

    view.ui.add(basemapGallery, {
      position: "top-right"
    });
    //Adding locate widget per the documentation along with the graphic marker
    const locateWidget = new Locate({
      view: view,
      graphic: new Graphic({
        symbol: { type: "simple-marker" }
      })
    });
    view.ui.add(locateWidget, "top-left");
    //Adding the search widget per the documentation
    const searchWidget = new Search({
    view: view
    });
    // Adds the search widget below other elements in the top left corner of the view
    view.ui.add(searchWidget, {
      position: "bottom-left",
      index: 2
    });
  });
  </script>
  </head>
  <body>
    <h1>Hello, world! This is GEOG 576 Lab 1.</h1>
    <div id="viewDiv"></div>
  </body>
