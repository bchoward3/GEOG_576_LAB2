<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GEOG 576: LAB 2</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="" />
    <!--ESRI calls-->
    <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.25/"></script>
    <style>
      html, body, #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Locate",
    "esri/Graphic",
    "esri/widgets/Search",
    "esri/layers/GraphicsLayer" ,
    "esri/geometry/Point",
    "esri/symbols/SimpleMarkerSymbol"
  ], function(esriConfig, Map, MapView, BasemapGallery, Locate, Graphic, Search, GraphicsLayer, Point, SimpleMarkerSymbol) {

    esriConfig.apiKey = "AAPTaRGqcRxmCNVEDvonpbTgnew..sI5bDJeCjdpt6HJ_sSkpLEtRhvqvz9f3gHBtjwNvMhREu7DFUQOcODvHGbKjH91oUzqVYaYkBmIkBIaNeiu4eVkNNK0ZneG0zLKgHcwk50ARrUUGgYiEomuYEcZJXZ_6AMq6KLYjEiIXVoNPWKxiNPxfmAqd2FoulwlTK3UPDDXv40EGeXadRIhoaMIcseCD_QhuVZ8uk150Fqb-vUb2nJbCwqofcVYSMTxksHA9ARmWc121VMJJS3VdQXU47m3BeAkA9rI.AT1_lfgE39am";

    const map = new Map({
      basemap: "topo-vector"
    });

    const view = new MapView({
      map: map,
      center: [-81.1329, 32.0043],
      zoom: 11,
      container: "viewDiv"
    });

    //Adding the basemap Gallery per the documentation
    const basemapGallery = new BasemapGallery({
      view: view
    });
    view.ui.add(basemapGallery, {
      position: "top-right"
    });

    //Adding locate widget per the documentation along with the graphic marker
    const locateWidget = new Locate({
      view: view,
      graphic: new Graphic({
        symbol: { type: "simple-marker" }
      })
    });
    view.ui.add(locateWidget, "top-left");

    //Adding the search widget per the documentation
    const searchWidget = new Search({
    view: view
    });
    // Adds the search widget below other elements in the top left corner of the view
    view.ui.add(searchWidget, {
      position: "top-left",
    });

    const graphicsLayer = new GraphicsLayer();
    map.add(graphicsLayer);

    const point = { //Create a point  
      type: "point",  
      longitude: -81.0953898,    //Forsyth Park
      latitude: 32.0674305
    };

    const simpleMarkerSymbol = new SimpleMarkerSymbol ({
      color: [0, 0, 150],  // 
      outline: {  
        color: [255, 255, 255], // White  
        width: 1
      }
    });

    const pointGraphic = new Graphic({  
      geometry: point,  
      symbol: simpleMarkerSymbol  
    });

    graphicsLayer.add(pointGraphic);

  });
  </script>
  </head>
  <body>
    <h1>Hello, GEOG 576! This is Lab 2.</h1>
    <div id="viewDiv"></div>
  </body>
</html>
