<!DOCTYPE html>
<html lang="en">
  <head>
    <title>GEOG 576: LAB 2</title>
    <meta charset="UTF-8" />

    <meta name="description" content="" />
    <!--ESRI calls-->
    <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/dark/main.css">
    <script src="https://js.arcgis.com/4.25/"></script>
    <style>
      html, body, #viewDiv {
        padding: 0;
        margin: 0;
        height: 100%;
        width: 100%;
      }
    </style>
    <script>
  require([
    "esri/config",
    "esri/Map",
    "esri/views/MapView",
    "esri/widgets/BasemapGallery",
    "esri/widgets/Locate",
    "esri/Graphic",
    "esri/widgets/Search",
    "esri/layers/GraphicsLayer" ,
    "esri/geometry/Point",
    "esri/symbols/SimpleMarkerSymbol",
    "esri/geometry/Polyline",
    "esri/geometry/Polygon",
    "esri/layers/FeatureLayer"

  ], function(esriConfig, Map, MapView, BasemapGallery, Locate, Graphic, Search, GraphicsLayer, Point, SimpleMarkerSymbol, Polyline, Polygon, FeatureLayer) {

    esriConfig.apiKey = "AAPTazVmijAZJOjPyl5hCMPDqAA..zs1UyCs6v5nYRp3ZLCrSdJOsU9zc1sFBjXYsgR9WZUMyR55XSkc3kkwwSVYP_eE28kwGrEVlKcTsFjjRmQ1zv1AK99gVXuateIyat5P_13Ly8TIpkWfc4hFsjJ3n865y_niBHTqRPUHJGuyUTOiK3uyifmZ5tSMqvittvIizKFNHVErA_SdsGBEIihl3ptOrvvOIW4jlcqoCmIewexn5JDyToQEwHy0PtJJ3PgbOtGKo_UHWa2LkyLOpS3UdYCVW71kW5mk.AT1_l2BfxoE2";

    const map = new Map({
      basemap: "topo-vector"
    });

    const view = new MapView({
      map: map,
      center: [-81.1329, 32.0043],
      zoom: 11,
      container: "viewDiv"
    });

    //Adding the basemap Gallery per the documentation
    const basemapGallery = new BasemapGallery({
      view: view
    });
    view.ui.add(basemapGallery, {
      position: "top-right"
    });

    //Adding locate widget per the documentation along with the graphic marker
    const locateWidget = new Locate({
      view: view,
      graphic: new Graphic({
        symbol: { type: "simple-marker" }
      })
    });
    view.ui.add(locateWidget, "top-left");

    //Adding the search widget per the documentation
    const searchWidget = new Search({
    view: view
    });
    // Adds the search widget below other elements in the top left corner of the view
    view.ui.add(searchWidget, {
      position: "top-left",
    });

    const graphicsLayer = new GraphicsLayer();
    map.add(graphicsLayer);

    const point = { //Create a point  
      type: "point",  
      longitude: -81.0953898,    //Forsyth Park
      latitude: 32.0674305
    };

    const simpleMarkerSymbol = new SimpleMarkerSymbol ({
      style: "triangle",
      color: [0, 128, 0],  // 
      outline: {  
        color: [255, 255, 255], // White  
        width: 3
      }
    });

    //creating the pop-up attributes for Forsyth Park
    const popupTemplate = {
    title: "{Name}",
    content: "{Description}"
    }
    const attributes = {
        Name: "Forsyth Park",
        Description: "Setting for the park bench scenes in Forrest Gump."
    }

    // Creating the point
    const pointGraphic = new Graphic({  
      geometry: point,  
      symbol: simpleMarkerSymbol,

      attributes: attributes,
      popupTemplate: popupTemplate
    });
    graphicsLayer.add(pointGraphic);

    //create polyline for W Bay St in Savannah (what passes for Main St here)
    const polyline = new Polyline({
      paths: [
        [
          [-81.1021873, 32.0837620],
          [-81.0965637, 32.0823280],
          [-81.0827593, 32.0786699]
        ]
      ]
    });

    // Creating the line symbol (red line)
    const simpleLineSymbol = {
      type: "simple-line",
      color: [255, 0, 0],
      width: 2
    };

    // I copied the same concept from the point pop up for this pop up. 
    const polylineAttributes = {
      Name: "W Bay ST",
      Description: "Main Street equivalent for Savannah."
    };

    const polylinePopupTemplate = {
      title: "{Name}",
      content: "{Description}"
    };


    // Creating graphic for the line
    const polylineGraphic = new Graphic({
      geometry: polyline,
      symbol: simpleLineSymbol,
      attributes: polylineAttributes,      // ✅ add this
      popupTemplate: polylinePopupTemplate  // ✅ add this
    });

    


  // Add it to the layer
  graphicsLayer.add(polylineGraphic);

    // Define the polygon geometry (roughly Hunter Army Airfield)
    const polygon = {
      type: "polygon",
      rings: [
        [-81.1690196, 32.0133738],
        [-81.1411186, 32.0275405],
        [-81.1225448, 32.0124473],
        [-81.1403532, 32.0027872],
        [-81.1690196, 32.0133738]  // close the ring by repeating the first point
      ]
    };

    // Fill color
    const simpleFillSymbol = {
      type: "simple-fill",
      color: [0, 0, 255, 0.3],
      outline: {
        color: [0, 0, 255],
        width: 1
      }
    };

    // I copied the same concept from the point pop up for this pop up. 
    const polygonAttributes = {
      Name: "Hunter Army Airfiled",
      Description: "Military installation in Savannah."
    };

    const polygonPopupTemplate = {
      title: "{Name}",
      content: "{Description}"
    };

    // Add the polygon
    const polygonGraphic = new Graphic({
      geometry: polygon,
      symbol: simpleFillSymbol,
      attributes: polygonAttributes,
      popupTemplate: polygonPopupTemplate,
    });

  graphicsLayer.add(polygonGraphic);

    // Creating the pop up layer and adding several fields for the pop up (hospital name, city/town and telephone number)
    const popuppolygon = {
      "title": "Hospitals",
      "content": "<b>Name:</b> {USER_Facility_Name}<br><b>City or town:</b> {USER_City_Town}<br><b>Facility phone number: {USER_Telephone_Number}<br>"
    }

    //Adding the hospitals feature layer
    const featurelayer = new FeatureLayer ({
      url: "https://services2.arcgis.com/FiaPA4ga0iQKduv3/arcgis/rest/services/Medicare_Hospitals/FeatureServer",

      // Adding the pop up 
      outFields: ["USER_Facility_Name","USER_City_Town","USER_Telephone_Number"],
      popupTemplate: popuppolygon
    });
    
    //Add airports feature layer to map
  map.add(featurelayer);

    // Creating the pop up layer and adding several fields for the pop up (airport type, city/town and telephone number)
    const popuppolygon2 = {
      "title": "Airports",
      "content": "<b>Facility type:</b> {Fac_Type}<br><b>City:</b> {City}<br><b>Owner phone number: {Owner_Phon}<br>"
    }

    //Adding the airports feature layer
    const featurelayer2 = new FeatureLayer ({
      url: "https://services.arcgis.com/HRPe58bUyBqyyiCt/arcgis/rest/services/Airports3212/FeatureServer",

      // Adding the pop up 
      outFields: ["USER_Facility_Name","USER_City_Town","USER_Telephone_Number"],
      popupTemplate: popuppolygon2
    });
    
    //Add feature layer to map
  map.add(featurelayer2);



  });
  </script>
  </head>
  <body>
    <h1>Hello, GEOG 576! This is Lab 2.</h1>
    <div id="viewDiv"></div>
  </body>
</html>
